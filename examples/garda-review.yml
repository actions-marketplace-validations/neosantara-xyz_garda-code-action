name: Garda Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: neosantara-xyz/garda-code-action@v1
        with:
          trigger_phrase: "@garda"
          mode: "auto"
          review_language: "id"
          # Optional: override the model (defaults to gemini-3.5-flash)
          # model: "gemini-3.5-flash"
          # Optional: fallback model(s) if the primary is unavailable
          # fallback_model: "claude-opus-4-6, claude-sonnet-4-6"
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
