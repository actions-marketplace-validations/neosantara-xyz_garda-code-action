name: Garda Fix

# Fix mode: Garda can commit suggested changes. Install the Garda Code app
# (https://github.com/apps/garda-code) and grant id-token: write — Garda runs
# as garda-code[bot] via the hosted token exchange, so commits are attributed
# to the bot with no private key to manage.

on:
  issue_comment:
    types: [created]

permissions:
  id-token: write # lets Garda mint its garda-code[bot] token
  contents: write # fix mode commits changes
  pull-requests: write
  issues: write
  actions: read

jobs:
  garda-fix:
    if: contains(github.event.comment.body, '@garda fix')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: neosantara-xyz/garda-code-action@v1
        with:
          trigger_phrase: "@garda"
          mode: "fix"
          allow_fix: "true"
          commit_strategy: "github-api"
          review_language: "id"
        env:
          NEOSANTARA_API_KEY: ${{ secrets.NEOSANTARA_API_KEY }}
